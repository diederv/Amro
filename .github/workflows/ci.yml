name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, test & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.toml', '**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant Gradle execute permission
        run: chmod +x ./gradlew

      - name: Write TMDB API key
        run: echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit + Paparazzi screenshot tests
        run: ./gradlew test --no-daemon

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/build/reports/tests/'

      - name: Upload Paparazzi diffs (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: paparazzi-diffs
          path: '**/build/paparazzi/failures/'

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: '**/build/reports/lint-results*.html'
